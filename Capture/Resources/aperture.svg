<?xml version="1.0" encoding="UTF-8"?>
<!--
  Capture It! — 마스터 조리개 아이콘 (디자인 레퍼런스)
  컨셉: 6각 조리개 + 듀오톤
    - 외곽 원: 화이트(#FFFFFF) 1.5px 라인
    - 6장 블레이드: 마젠타(#E91E63) 필
    - 중심 도트: 화이트
  파생: tray.ico (4해상도), Aperture.xaml (WPF DrawingImage)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 블레이드 한 장: 중심에서 외곽으로 향하는 깃털 형태 -->
    <path id="blade" d="M 32 32 L 56 22 A 26 26 0 0 1 56 42 Z" fill="#E91E63"/>
  </defs>

  <!-- 6장 블레이드: 60도씩 회전 -->
  <use href="#blade" transform="rotate(0 32 32)"/>
  <use href="#blade" transform="rotate(60 32 32)"/>
  <use href="#blade" transform="rotate(120 32 32)"/>
  <use href="#blade" transform="rotate(180 32 32)"/>
  <use href="#blade" transform="rotate(240 32 32)"/>
  <use href="#blade" transform="rotate(300 32 32)"/>

  <!-- 외곽 원 (화이트 라인) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- 중심 도트 -->
  <circle cx="32" cy="32" r="3" fill="#FFFFFF"/>
</svg>
