name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

# Release·tag push 권한 필요
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # auto-tag 단계에서 기존 v* 태그 전부 필요

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Capture/Capture.csproj

      - name: Build (Release)
        run: dotnet build Capture/Capture.csproj -c Release --no-restore

      - name: Publish (Portable single EXE)
        run: dotnet publish Capture/Capture.csproj -p:PublishProfile=Portable

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capture-Portable-${{ github.sha }}
          path: build/Portable/Capture.exe
          if-no-files-found: error
          retention-days: 30

      # ── 아래는 master 직접 push (PR 머지 포함) 한정 ──────────────────────────

      - name: Compute next tag (date-based, KST)
        id: tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          today=$(TZ=Asia/Seoul date +%Y.%m.%d)
          base="v${today}"
          if ! git rev-parse -q --verify "refs/tags/${base}" >/dev/null; then
            new="${base}"
          else
            # 같은 날짜에 이미 태그가 있으면 .2, .3 ... 접미사
            n=2
            while git rev-parse -q --verify "refs/tags/${base}.${n}" >/dev/null; do
              n=$((n + 1))
            done
            new="${base}.${n}"
          fi
          echo "new_tag=$new" >> "$GITHUB_OUTPUT"
          echo "Next tag: $new"

      - name: Create and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.new_tag }}" "${{ github.sha }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Create GitHub Release with portable EXE
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          files: build/Portable/Capture.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
