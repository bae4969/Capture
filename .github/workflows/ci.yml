name: CI

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# 동시 실행 차단: 같은 PR(또는 ref) 의 진행 중 워크플로우는 새 trigger 가 들어오면 cancel.
# 단, closed/merged 시점의 release(태그+릴리즈) 단계는 cancel 되면 안 되므로 closed 액션은 예외.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event.action != 'closed' }}

# Release·tag push 권한 필요
permissions:
  contents: write

jobs:
  build:
    # PR 가 머지 없이 닫히면 skip
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PR 머지 시점에는 master 의 머지 커밋을 직접 체크아웃해 그 commit 에 태그
          ref: ${{ github.event.pull_request.merged == true && github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # PR open/synchronize/reopened 시에만 publish + artifact 업로드.
      # closed/merged 시점에는 PR head sha 의 마지막 빌드 artifact 를 재사용해 동일 SHA 를 두 번
      # 빌드하지 않는다.
      - name: Publish (Portable single EXE)
        if: github.event.action != 'closed'
        run: dotnet publish Capture/Capture.csproj -p:PublishProfile=Portable

      - name: Upload portable EXE artifact
        if: github.event.action != 'closed'
        uses: actions/upload-artifact@v4
        with:
          # PR head sha 로 식별 — closed 시점에 같은 이름으로 재발견 가능
          name: Capture-Portable-${{ github.event.pull_request.head.sha }}
          path: build/Portable/Capture.exe
          if-no-files-found: error
          retention-days: 30

      # ── 아래는 PR 머지 시점에만 동작 ────────────────────────────────────────

      # 머지 시점: 새로 빌드하지 않고 PR 의 마지막 synchronize/opened run 의 artifact 를 다운로드.
      # 같은 head_sha 의 가장 최신 ci.yml run 을 gh CLI 로 찾아 download.
      - name: Download portable EXE from PR build
        if: github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          head_sha="${{ github.event.pull_request.head.sha }}"
          artifact_name="Capture-Portable-$head_sha"
          run_id=$(gh run list --workflow ci.yml --json databaseId,headSha,conclusion --limit 100 \
            --jq "[.[] | select(.headSha==\"$head_sha\" and .conclusion==\"success\")][0].databaseId")
          if [ -z "$run_id" ]; then
            echo "no successful prior run for head_sha=$head_sha — fallback to fresh publish"
            dotnet publish Capture/Capture.csproj -p:PublishProfile=Portable
          else
            echo "downloading $artifact_name from run_id=$run_id"
            mkdir -p build/Portable
            gh run download "$run_id" -n "$artifact_name" -D build/Portable
          fi

      - name: Compute next tag (date + merge sha7, KST)
        id: tag
        if: github.event.pull_request.merged == true
        shell: bash
        run: |
          today=$(TZ=Asia/Seoul date +%Y.%m.%d)
          sha="${{ github.event.pull_request.merge_commit_sha }}"
          short_sha="${sha:0:7}"
          new="v${today}-${short_sha}"
          echo "new_tag=$new" >> "$GITHUB_OUTPUT"
          echo "Next tag: $new"

      - name: Create and push tag
        if: github.event.pull_request.merged == true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.new_tag }}" "${{ github.event.pull_request.merge_commit_sha }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Create GitHub Release with portable EXE
        if: github.event.pull_request.merged == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          files: build/Portable/Capture.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
