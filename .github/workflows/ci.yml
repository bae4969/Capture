name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Capture/Capture.csproj

      - name: Build (Release)
        run: dotnet build Capture/Capture.csproj -c Release --no-restore

      - name: Publish (Portable single EXE)
        run: dotnet publish Capture/Capture.csproj -p:PublishProfile=Portable

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capture-Portable-${{ github.sha }}
          path: build/Portable/Capture.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Portable/Capture.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
